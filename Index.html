<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Perfect - Ed Sheeran: Estudio Total</title>
    <style>
        :root { --primary: #0f172a; --secondary: #1e293b; --accent: #38bdf8; --text: #f8fafc; --success: #22c55e; --danger: #ef4444; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: var(--primary); color: var(--text); margin: 0; padding: 20px; display: flex; justify-content: center; }
        .app-container { width: 100%; max-width: 850px; background: var(--secondary); padding: 30px; border-radius: 20px; box-shadow: 0 15px 35px rgba(0,0,0,0.5); }
        .header { text-align: center; border-bottom: 3px solid var(--accent); margin-bottom: 30px; padding-bottom: 10px; }
        .menu-box { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 30px; }
        button { padding: 18px; border: none; border-radius: 12px; cursor: pointer; font-weight: bold; font-size: 1.1rem; transition: 0.3s; background: #334155; color: white; }
        button:hover { background: var(--accent); color: var(--primary); transform: translateY(-2px); }
        .quiz-screen { background: rgba(0,0,0,0.2); padding: 25px; border-radius: 15px; }
        .options-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 25px; }
        .opt-btn { background: #f8fafc; color: #1e293b; text-align: left; font-size: 1rem; }
        .correct { background: var(--success) !important; color: white; }
        .wrong { background: var(--danger) !important; color: white; }
        .stats-bar { display: flex; justify-content: space-between; font-weight: bold; color: var(--accent); margin-bottom: 10px; }
        .progress-container { height: 12px; background: #334155; border-radius: 6px; overflow: hidden; margin-bottom: 25px; }
        .progress-fill { height: 100%; background: var(--accent); width: 0%; transition: 0.4s; }
        .voice-btn { background: #818cf8; width: 100%; margin-top: 20px; }
        .hidden { display: none; }
        .final-score { font-size: 5rem; color: var(--accent); margin: 20px 0; }
    </style>
</head>
<body>

<div class="app-container">
    <div class="header">
        <h1>Perfect - Ed Sheeran</h1>
        <p>Dominio Total: Frases + Vocabulario</p>
    </div>

    <div id="start-menu">
        <h3 style="text-align: center;">Selecciona tu modo de estudio:</h3>
        <div class="menu-box">
            <button onclick="startApp('phrases')">ESTUDIAR TODAS LAS FRASES<br><small>(La letra completa)</small></button>
            <button onclick="startApp('words')">ESTUDIAR TODAS LAS PALABRAS<br><small>(Vocabulario clave)</small></button>
        </div>
    </div>

    <div id="quiz-area" class="hidden">
        <div class="stats-bar">
            <span id="label-count">Pregunta 1 de X</span>
            <span id="label-score">Aciertos: 0</span>
        </div>
        <div class="progress-container"><div id="bar" class="progress-fill"></div></div>

        <div class="quiz-screen">
            <h2 id="question-text" style="margin-top:0; min-height: 60px;"></h2>
            <div id="options-container" class="options-grid"></div>
            
            <button onclick="speak()" class="voice-btn">🔊 Escuchar Pronunciación (Voz)</button>
            <button id="next-btn" class="hidden" style="background: var(--success); width: 100%; margin-top: 15px;" onclick="renderNext()">Siguiente Pregunta →</button>
        </div>
    </div>

    <div id="result-screen" class="hidden" style="text-align: center;">
        <h2>¡Práctica Terminada!</h2>
        <div id="final-grade" class="final-score">0%</div>
        <p id="final-comment" style="font-size: 1.2rem;"></p>
        <button onclick="location.reload()" class="voice-btn" style="background: var(--accent); color: var(--primary);">Volver al Menú</button>
    </div>
</div>

<script>
    // BASE DE DATOS 100% COMPLETA
    const phrasesData = [
        {en: "I found a love for me", es: "Encontré un amor para mí"},
        {en: "Darling just dive right in and follow my lead", es: "Cariño solo sumérgete y sigue mi guía"},
        {en: "I found a girl beautiful and sweet", es: "Encontré a una chica hermosa y dulce"},
        {en: "I never knew you were the someone waiting for me", es: "Nunca supe que eras tú quien me esperaba"},
        {en: "Cause we were just kids when we fell in love", es: "Porque solo éramos niños cuando nos enamoramos"},
        {en: "Not knowing what it was", es: "Sin saber lo que era"},
        {en: "I will not give you up this time", es: "No te dejaré ir esta vez"},
        {en: "But darling just kiss me slow", es: "Pero cariño solo bésame despacio"},
        {en: "Your heart is all I own", es: "Tu corazón es todo lo que poseo"},
        {en: "And in your eyes you're holding mine", es: "Y en tus ojos estás sosteniendo el mío"},
        {en: "Baby I'm dancing in the dark", es: "Bebé estoy bailando en la oscuridad"},
        {en: "With you between my arms", es: "Contigo entre mis brazos"},
        {en: "Barefoot on the grass", es: "Descalzos sobre el césped"},
        {en: "Listening to our favorite song", es: "Escuchando nuestra canción favorita"},
        {en: "When you said you looked a mess", es: "Cuando dijiste que te veías fatal"},
        {en: "I whispered underneath my breath", es: "Susurré por lo bajo (aliento)"},
        {en: "But you heard it", es: "Pero lo escuchaste"},
        {en: "Darling you look perfect tonight", es: "Cariño te ves perfecta esta noche"},
        {en: "I found a woman stronger than anyone I know", es: "Encontré una mujer más fuerte que nadie que conozca"},
        {en: "She shares my dreams", es: "Ella comparte mis sueños"},
        {en: "I hope that someday I'll share her home", es: "Espero que algún día comparta su hogar"},
        {en: "I found a love to carry more than just my secrets", es: "Encontré un amor para cargar más que solo mis secretos"},
        {en: "To carry love to carry children of our own", es: "Para llevar amor, para tener nuestros propios hijos"},
        {en: "We are still kids but we're so in love", es: "Aún somos niños pero estamos tan enamorados"},
        {en: "Fighting against all odds", es: "Luchando contra todas las probabilidades"},
        {en: "I know we'll be alright this time", es: "Sé que estaremos bien esta vez"},
        {en: "Darling just hold my hand", es: "Cariño solo toma mi mano"},
        {en: "Be my girl I'll be your man", es: "Sé mi chica, yo seré tu hombre"},
        {en: "I see my future in your eyes", es: "Veo mi futuro en tus ojos"},
        {en: "When I saw you in that dress looking so beautiful", es: "Cuando te vi con ese vestido luciendo tan hermosa"},
        {en: "I don't deserve this", es: "No me merezco esto"},
        {en: "I have faith in what I see", es: "Tengo fe en lo que veo"},
        {en: "Now I know I have met an angel in person", es: "Ahora sé que he conocido a un ángel en persona"},
        {en: "And she looks perfect", es: "Y ella se ve perfecta"}
    ];

    const wordsData = [
        {en: "Found", es: "Encontré / Hallado"}, {en: "Love", es: "Amor"}, {en: "Darling", es: "Cariño / Amado"},
        {en: "Dive", es: "Sumergirse / Clavado"}, {en: "Lead", es: "Guía / Liderazgo"}, {en: "Sweet", es: "Dulce"},
        {en: "Waiting", es: "Esperando"}, {en: "Kids", es: "Niños / Jóvenes"}, {en: "Heart", es: "Corazón"},
        {en: "Own", es: "Poseer / Propio"}, {en: "Dancing", es: "Bailando"}, {en: "Dark", es: "Oscuridad"},
        {en: "Arms", es: "Brazos"}, {en: "Barefoot", es: "Descalzo"}, {en: "Grass", es: "Césped / Pasto"},
        {en: "Mess", es: "Desastre / Lio"}, {en: "Whispered", es: "Susurró"}, {en: "Breath", es: "Aliento / Respiración"},
        {en: "Stronger", es: "Más fuerte"}, {en: "Dreams", es: "Sueños"}, {en: "Someday", es: "Algún día"},
        {en: "Secrets", es: "Secretos"}, {en: "Children", es: "Niños / Hijos"}, {en: "Fighting", es: "Luchando"},
        {en: "Odds", es: "Probabilidades / Dificultades"}, {en: "Future", es: "Futuro"}, {en: "Dress", es: "Vestido"},
        {en: "Deserve", es: "Merecer"}, {en: "Faith", es: "Fe"}, {en: "Angel", es: "Ángel"}
    ];

    let currentPool = [];
    let currentIdx = 0;
    let score = 0;

    function startApp(mode) {
        document.getElementById('start-menu').classList.add('hidden');
        document.getElementById('quiz-area').classList.remove('hidden');
        currentPool = (mode === 'phrases') ? phrasesData : wordsData;
        currentIdx = 0;
        score = 0;
        renderNext();
    }

    function renderNext() {
        if(currentIdx >= currentPool.length) return showFinal();
        
        const item = currentPool[currentIdx];
        document.getElementById('question-text').innerText = `¿Cómo traduces: "${item.en}"?`;
        document.getElementById('label-count').innerText = `Pregunta ${currentIdx + 1} de ${currentPool.length}`;
        document.getElementById('bar').style.width = `${((currentIdx + 1) / currentPool.length) * 100}%`;
        document.getElementById('next-btn').classList.add('hidden');

        // Generar opciones locas
        let options = [item.es];
        let others = (currentPool === phrasesData ? phrasesData : wordsData).map(x => x.es);
        while(options.length < 4) {
            let r = others[Math.floor(Math.random() * others.length)];
            if(!options.includes(r)) options.push(r);
        }
        options.sort(() => Math.random() - 0.5);

        const container = document.getElementById('options-container');
        container.innerHTML = "";
        options.forEach(opt => {
            const b = document.createElement('button');
            b.className = 'opt-btn';
            b.innerText = opt;
            b.onclick = () => verify(b, opt, item.es);
            container.appendChild(b);
        });
    }

    function verify(btn, selected, correct) {
        const btns = document.querySelectorAll('.opt-btn');
        btns.forEach(b => b.disabled = true);
        
        if(selected === correct) {
            btn.classList.add('correct');
            score++;
        } else {
            btn.classList.add('wrong');
            btns.forEach(b => { if(b.innerText === correct) b.classList.add('correct'); });
        }
        document.getElementById('label-score').innerText = `Aciertos: ${score}`;
        document.getElementById('next-btn').classList.remove('hidden');
        currentIdx++;
    }

    function speak() {
        const textToSpeak = currentPool[currentIdx - 1]?.en || currentPool[currentIdx].en;
        const speech = new SpeechSynthesisUtterance(textToSpeak);
        speech.lang = 'en-US';
        window.speechSynthesis.speak(speech);
    }

    function showFinal() {
        document.getElementById('quiz-area').classList.add('hidden');
        document.getElementById('result-screen').classList.remove('hidden');
        const percentage = Math.round((score / currentPool.length) * 100);
        document.getElementById('final-grade').innerText = percentage + "%";
        
        let msg = "";
        if(percentage === 100) msg = "¡Increíble! Dominas Perfect al 100%.";
        else if(percentage >= 80) msg = "¡Muy bien! Casi no tienes errores.";
        else if(percentage >= 50) msg = "Buen progreso, pero puedes mejorar.";
        else msg = "Necesitas repasar un poco más la letra.";
        document.getElementById('final-comment').innerText = msg;
    }
</script>

</body>
</html>
